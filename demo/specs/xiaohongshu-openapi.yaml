openapi: "3.0.0"
info:
  title: 小红书个人主页 API
  version: "1.0.0"
  description: 小红书个人主页相关接口文档
servers:
  - url: http://localhost:8080
    description: Mock server / local
paths:
  # ===== 1. 用户认证 =====
  /api/auth/login:
    post:
      operationId: login
      summary: 用户登录
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  description: 手机号（11位）
                  minLength: 11
                  maxLength: 11
                code:
                  type: string
                  description: 短信验证码（6位）
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: 登录成功
        "401":
          description: 验证码错误

  # ===== 2. 用户信息 =====
  /api/user/profile:
    get:
      operationId: getUserProfile
      summary: 获取用户信息
      tags: [User]
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: 目标用户ID，不填则返回当前用户
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "404":
          description: 用户不存在
    put:
      operationId: updateUserProfile
      summary: 编辑个人资料
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 20
                  description: 支持中英文数字
                bio:
                  type: string
                  maxLength: 100
                  description: 个人简介
                gender:
                  type: integer
                  enum: [0, 1, 2]
                  description: 0=保密, 1=男, 2=女
      responses:
        "200":
          description: 更新成功
        "409":
          description: 昵称已被使用

  /api/user/avatar:
    post:
      operationId: uploadAvatar
      summary: 上传头像
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
      responses:
        "200":
          description: 上传成功
        "400":
          description: 文件过大

  # ===== 3. 关注系统 =====
  /api/user/follow:
    post:
      operationId: followUser
      summary: 关注用户
      tags: [Follow]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: integer
      responses:
        "200":
          description: 关注成功
        "400":
          description: 关注已达上限
    delete:
      operationId: unfollowUser
      summary: 取关用户
      tags: [Follow]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: integer
      responses:
        "200":
          description: 已取消关注

  /api/user/followers:
    get:
      operationId: getFollowers
      summary: 获取粉丝列表
      tags: [Follow]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK

  # ===== 4. 内容模块 =====
  /api/user/notes:
    get:
      operationId: getUserNotes
      summary: 获取用户笔记列表
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: tab
          in: query
          required: false
          schema:
            type: string
            enum: [notes, collected, liked]
            default: notes
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK

  /api/notes/{noteId}:
    get:
      operationId: getNoteDetail
      summary: 获取笔记详情
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
        "404":
          description: 笔记不存在

  /api/notes/{noteId}/like:
    post:
      operationId: likeNote
      summary: 点赞笔记
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 点赞成功
    delete:
      operationId: unlikeNote
      summary: 取消点赞
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 已取消点赞

  /api/notes/{noteId}/collect:
    post:
      operationId: collectNote
      summary: 收藏笔记
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 收藏成功

  /api/notes/{noteId}/comments:
    get:
      operationId: getComments
      summary: 获取评论列表
      tags: [Content]
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
    post:
      operationId: createComment
      summary: 发表评论
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 500
                replyTo:
                  type: integer
      responses:
        "200":
          description: 评论成功
        "400":
          description: 评论包含违规内容

  # ===== 5. 搜索 =====
  /api/search:
    get:
      operationId: search
      summary: 搜索用户或笔记
      tags: [Search]
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [user, note]
            default: note
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK

  # ===== 6. 隐私设置 =====
  /api/user/privacy:
    get:
      operationId: getPrivacySettings
      summary: 获取隐私设置
      tags: [Privacy]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    put:
      operationId: updatePrivacySettings
      summary: 更新隐私设置
      tags: [Privacy]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contentVisibility:
                  type: string
                  enum: [public, followers, private]
                allowStrangerMessage:
                  type: boolean
                showFollowerList:
                  type: boolean
      responses:
        "200":
          description: 隐私设置已更新

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
