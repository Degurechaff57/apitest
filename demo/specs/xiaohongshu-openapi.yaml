openapi: "3.0.0"
info:
  title: 小红书个人主页 API
  version: "1.0.0"
  description: 小红书个人主页相关接口文档
servers:
  - url: http://localhost:8080
    description: Mock server / local
paths:
  # ===== 1. 用户认证 =====
  /api/auth/login:
    post:
      operationId: login
      summary: 用户登录
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  description: 手机号（11位）
                  minLength: 11
                  maxLength: 11
                code:
                  type: string
                  description: 短信验证码（6位）
                  minLength: 6
                  maxLength: 6
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: 验证码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ===== 2. 用户信息 =====
  /api/user/profile:
    get:
      operationId: getUserProfile
      summary: 获取用户信息
      tags: [User]
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: 目标用户ID，不填则返回当前用户
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUserProfile
      summary: 编辑个人资料
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 20
                  description: 支持中英文数字
                bio:
                  type: string
                  maxLength: 100
                  description: 个人简介
                gender:
                  type: integer
                  enum: [0, 1, 2]
                  description: 0=保密, 1=男, 2=女
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfileResponse"
        "409":
          description: 昵称已被使用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/user/avatar:
    post:
      operationId: uploadAvatar
      summary: 上传头像
      tags: [User]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "400":
          description: 文件过大
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ===== 3. 关注系统 =====
  /api/user/follow:
    post:
      operationId: followUser
      summary: 关注用户
      tags: [Follow]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: integer
      responses:
        "200":
          description: 关注成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResponse"
        "400":
          description: 关注已达上限
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unfollowUser
      summary: 取关用户
      tags: [Follow]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: integer
      responses:
        "200":
          description: 已取消关注
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/user/followers:
    get:
      operationId: getFollowers
      summary: 获取粉丝列表
      tags: [Follow]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowerListResponse"

  # ===== 4. 内容模块 =====
  /api/user/notes:
    get:
      operationId: getUserNotes
      summary: 获取用户笔记列表
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: tab
          in: query
          required: false
          schema:
            type: string
            enum: [notes, collected, liked]
            default: notes
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListResponse"

  /api/notes/{noteId}:
    get:
      operationId: getNoteDetail
      summary: 获取笔记详情
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetailResponse"
        "404":
          description: 笔记不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/notes/{noteId}/like:
    post:
      operationId: likeNote
      summary: 点赞笔记
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 点赞成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
    delete:
      operationId: unlikeNote
      summary: 取消点赞
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 已取消点赞
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/notes/{noteId}/collect:
    post:
      operationId: collectNote
      summary: 收藏笔记
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 收藏成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectResponse"

  /api/notes/{noteId}/comments:
    get:
      operationId: getComments
      summary: 获取评论列表
      tags: [Content]
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
    post:
      operationId: createComment
      summary: 发表评论
      tags: [Content]
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 500
                replyTo:
                  type: integer
      responses:
        "200":
          description: 评论成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          description: 评论包含违规内容
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ===== 5. 搜索 =====
  /api/search:
    get:
      operationId: search
      summary: 搜索用户或笔记
      tags: [Search]
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [user, note]
            default: note
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  # ===== 6. 隐私设置 =====
  /api/user/privacy:
    get:
      operationId: getPrivacySettings
      summary: 获取隐私设置
      tags: [Privacy]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyResponse"
    put:
      operationId: updatePrivacySettings
      summary: 更新隐私设置
      tags: [Privacy]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contentVisibility:
                  type: string
                  enum: [public, followers, private]
                allowStrangerMessage:
                  type: boolean
                showFollowerList:
                  type: boolean
      responses:
        "200":
          description: 隐私设置已更新
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    MessageResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            userId:
              type: integer
            nickname:
              type: string

    UserProfileResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      properties:
        userId:
          type: integer
        nickname:
          type: string
        avatar:
          type: string
          format: url
        bio:
          type: string
        gender:
          type: integer
        followerCount:
          type: integer
        followingCount:
          type: integer
        noteCount:
          type: integer
        verified:
          type: object
          properties:
            type:
              type: string
            desc:
              type: string
        tags:
          type: array
          items:
            type: string
        joinDate:
          type: string
          format: date

    UpdateProfileResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            nickname:
              type: string
            bio:
              type: string

    AvatarResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            avatarUrl:
              type: string
              format: url

    FollowResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            isMutual:
              type: boolean

    FollowerListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            list:
              type: array
              items:
                $ref: "#/components/schemas/FollowerUser"

    FollowerUser:
      type: object
      properties:
        userId:
          type: integer
        nickname:
          type: string
        avatar:
          type: string
          format: url

    NoteListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            hasMore:
              type: boolean
            list:
              type: array
              items:
                $ref: "#/components/schemas/NoteSummary"

    NoteSummary:
      type: object
      properties:
        noteId:
          type: integer
        title:
          type: string
        cover:
          type: string
          format: url
        likeCount:
          type: integer
        commentCount:
          type: integer
        hasProduct:
          type: boolean
        productPrice:
          type: number
        createTime:
          type: string
          format: date-time

    NoteDetailResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          $ref: "#/components/schemas/NoteDetail"

    NoteDetail:
      type: object
      properties:
        noteId:
          type: integer
        title:
          type: string
        content:
          type: string
        images:
          type: array
          items:
            type: string
            format: url
        tags:
          type: array
          items:
            type: string
        author:
          $ref: "#/components/schemas/FollowerUser"
        likeCount:
          type: integer
        collectCount:
          type: integer
        commentCount:
          type: integer
        isLiked:
          type: boolean
        isCollected:
          type: boolean
        createTime:
          type: string
          format: date-time

    LikeResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            likeCount:
              type: integer
            isLiked:
              type: boolean

    CollectResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            collectCount:
              type: integer
            isCollected:
              type: boolean

    CommentListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            list:
              type: array
              items:
                $ref: "#/components/schemas/CommentItem"

    CommentItem:
      type: object
      properties:
        commentId:
          type: integer
        userId:
          type: integer
        nickname:
          type: string
        content:
          type: string
        likeCount:
          type: integer
        createTime:
          type: string
          format: date-time

    CommentResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            commentId:
              type: integer
            content:
              type: string

    SearchResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            keyword:
              type: string
            total:
              type: integer
            list:
              type: array
              items:
                $ref: "#/components/schemas/SearchResult"

    SearchResult:
      type: object
      properties:
        noteId:
          type: integer
        title:
          type: string
        author:
          $ref: "#/components/schemas/FollowerUser"
        likeCount:
          type: integer

    PrivacyResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            contentVisibility:
              type: string
            allowStrangerMessage:
              type: boolean
            showFollowerList:
              type: boolean
